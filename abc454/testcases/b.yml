---
type: Batch
timelimit: ~
match: Lines

cases:
  - name: sample1
    in: |
      3 4
      1 2 4
    out: |
      Yes
      No
  - name: sample2
    in: |
      4 2
      1 2 1 2
    out: |
      No
      Yes
  - name: sample3
    in: |
      4 4
      1 3 2 1
    out: |
      No
      No
  - name: sample4
    in: |
      5 5
      1 3 4 2 5
    out: |
      Yes
      Yes

extend:
  - type: Text
    path: "./b"
    in: /in/*.txt
    out: /out/*.txt
